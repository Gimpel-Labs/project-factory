name: 🚀 Project Factory

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Template exato'
        required: true
      repo:
        required: true
      private:
        type: boolean
        default: true

jobs:
  factory:
    runs-on: [self-hosted, proxmox]  # ← SUAS LABELS
    steps:
      - name: Debug
        run: |
          echo "Runner: $(uname -a)"
          echo "User: $(whoami)"
          echo "Disk: $(df -h | head -3)"
          
      - name: Listar templates
        run: |
          curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/orgs/Gimpel-Labs/repos?per_page=20 \
            | grep -E "${{ inputs.template }}" \
            | grep name || echo "Template não encontrado"

      - name: Criar projeto
        run: |
          RESPONSE=$(curl -s -w "\nCODE:%{http_code}" \
            -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.baptiste-preview+json" \
            "https://api.github.com/repos/Gimpel-Labs/${{ inputs.template }}/generate" \
            -d "{\"owner\":\"Gimpel-Labs\",\"name\":\"${{ inputs.repo }}\",\"description\":\"Factory\",\"private\":${{ inputs.private }}}")
          
          echo "$RESPONSE"
          if ! echo "$RESPONSE" | grep -q "CODE:201"; then
            exit 1
          fi

      - name: Sucesso
        run: echo "✅ ${{ inputs.repo }} criado!"
