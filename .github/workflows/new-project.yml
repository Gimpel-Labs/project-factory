name: 🚀 Criar Novo Projeto

on:
  workflow_dispatch:
    inputs:
      template_name:
        description: 'Template a usar'
        required: true
        type: choice
        options:
          - spring-boot
          - nextjs
      repo_name:
        description: 'Nome do repositório'
        required: true
      group_id:
        description: 'Package/groupId'
        required: true
        default: 'com.gimpellabs'
      artifact_id:
        description: 'Nome do artefato'
        required: true
      description:
        description: 'Descrição'
        required: false
        default: 'Novo projeto'
      is_private:
        description: 'Privado?'
        type: boolean
        default: true

jobs:
  factory:
    runs-on: self-hosted
    steps:
      - name: Mapear template
        id: template
        run: |
          case "${{ inputs.template_name }}" in
            "spring-boot") echo "template_repo=template-spring-boot" >> $GITHUB_OUTPUT ;;
            "nextjs") echo "template_repo=template-nextjs" >> $GITHUB_OUTPUT ;;
            *) echo "Template inválido"; exit 1 ;;
          esac

      - name: Criar repositório
        run: |
          curl -s -w "\nHTTP:%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.baptiste-preview+json" \
            "https://api.github.com/repos/Gimpel-Labs/${{ steps.template.outputs.template_repo }}/generate" \
            -d "{
              \"owner\": \"Gimpel-Labs\",
              \"name\": \"${{ inputs.repo_name }}\",
              \"description\": \"${{ inputs.description }}\",
              \"private\": ${{ inputs.is_private }}
            }" > response.txt

          HTTP_CODE=$(tail -1 response.txt)
          if [ "$HTTP_CODE" != "HTTP:201" ]; then
            echo "❌ Erro HTTP $HTTP_CODE"
            cat response.txt
            exit 1
          fi
          echo "✅ Repositório criado!"

      - name: Aguardar disponibilidade
        run: sleep 10

      - name: Personalizar projeto
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Gimpel-Labs/${{ inputs.repo_name }}.git" \
            "/tmp/${{ inputs.repo_name }}"
          cd "/tmp/${{ inputs.repo_name }}"

          GROUP_ID="${{ inputs.group_id }}"
          ARTIFACT_ID="${{ inputs.artifact_id }}"

          if [ "${{ inputs.template_name }}" = "spring-boot" ]; then
            sed -i "s|<groupId>.*</groupId>|<groupId>$GROUP_ID</groupId>|g" pom.xml
            sed -i "s|<artifactId>.*</artifactId>|<artifactId>$ARTIFACT_ID</artifactId>|g" pom.xml
            sed -i "s|<name>.*</name>|<name>$ARTIFACT_ID</name>|g" pom.xml
            echo "✅ Spring Boot personalizada"
          fi

          if [ "${{ inputs.template_name }}" = "nextjs" ]; then
            sed -i "s|\"name\": \".*\"|\"name\": \"$ARTIFACT_ID\",|g" package.json
            mkdir -p src/lib/$ARTIFACT_ID
            echo "// Utils para $ARTIFACT_ID" > "src/lib/$ARTIFACT_ID/index.ts"
            echo "✅ Next.js personalizada"
          fi

          git config user.email "factory@
