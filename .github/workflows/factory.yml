name: 🚀 Generate Project from Template
on:
  workflow_dispatch:
    inputs:
      repo-name:
        description: 'Project name'
        required: true
        default: 'example-service'
      template-repo:
        description: 'Template'
        required: true
        type: choice
        options:
          - spring-boot
          - nextjs
      private:
        description: 'Private?'
        type: boolean
        default: true

jobs:
  Generate:
    runs-on: self-hosted
    steps:
      - name: Generate Repo from Template
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const repoName = '${{ github.event.inputs.repo-name }}';
            const templateSuffix = '${{ github.event.inputs.template-repo }}';
            const templateRepo = `template-${templateSuffix}`;
            const org = 'Gimpel-Labs';

            try {
              await github.request('GET /repos/{owner}/{repo}', {
                owner: org,
                repo: repoName
              });
              core.setFailed(`Repository "${org}/${repoName}" already exists in the organization.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const response = await github.request('POST /repos/{template_owner}/{template_repo}/generate', {
              template_owner: org,
              template_repo: templateRepo,
              name: repoName,
              owner: org,
              private: ${{ github.event.inputs.private }},
              include_all_branches: false
            });
            console.log(`New org repo: ${response.data.full_name}`);

            await github.request('PUT /repos/{owner}/{repo}/actions/permissions', {
              owner: org,
              repo: repoName,
              enabled: false
            });
            console.log('Actions disabled');

            if (templateSuffix === 'spring-boot') {
              let pomFile;
              const maxAttempts = 10;
              const retryDelayMs = 3000;
              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                  pomFile = await github.request('GET /repos/{owner}/{repo}/contents/{path}', {
                    owner: org,
                    repo: repoName,
                    path: 'pom.xml'
                  });
                  break;
                } catch (error) {
                  if (![404, 409].includes(error.status) || attempt === maxAttempts) {
                    throw error;
                  }
                  await new Promise(resolve => setTimeout(resolve, retryDelayMs));
                }
              }

              const content = Buffer.from(pomFile.data.content, 'base64').toString('utf-8');

              const parentEndIndex = content.indexOf('</parent>');
              let updatedContent;
              if (parentEndIndex !== -1) {
                const before = content.substring(0, parentEndIndex + '</parent>'.length);
                const after = content.substring(parentEndIndex + '</parent>'.length);
                updatedContent = before + after.replace(/<artifactId>[^<]*<\/artifactId>/, `<artifactId>${repoName}</artifactId>`);
              } else {
                updatedContent = content.replace(/<artifactId>[^<]*<\/artifactId>/, `<artifactId>${repoName}</artifactId>`);
              }

              updatedContent = updatedContent.replace(/<name>[^<]*<\/name>/, `<name>${repoName}</name>`);

              await github.request('PUT /repos/{owner}/{repo}/contents/{path}', {
                owner: org,
                repo: repoName,
                path: 'pom.xml',
                message: `chore: update pom.xml with project name ${repoName}`,
                content: Buffer.from(updatedContent).toString('base64'),
                sha: pomFile.data.sha
              });

              console.log(`pom.xml updated with artifactId and name: ${repoName}`);
            }

            if (templateSuffix === 'nextjs') {

              const maxAttempts = 10;
              const retryDelayMs = 3000;

              const fetchFile = async (path) => {
                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                  try {
                    return await github.request('GET /repos/{owner}/{repo}/contents/{path}', {
                      owner: org,
                      repo: repoName,
                      path
                    });
                  } catch (error) {
                    if (![404, 409].includes(error.status) || attempt === maxAttempts) {
                      throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, retryDelayMs));
                  }
                }
              };

              const pkgFile = await fetchFile('package.json');
              const pkg = JSON.parse(Buffer.from(pkgFile.data.content, 'base64').toString('utf-8'));
              pkg.name = repoName;

              const lockFile = await fetchFile('package-lock.json');
              const lock = JSON.parse(Buffer.from(lockFile.data.content, 'base64').toString('utf-8'));
              lock.name = repoName;
              if (lock.packages && lock.packages['']) {
                lock.packages[''].name = repoName;
              }

              const defaultBranch = response.data.default_branch;

              const refData = await github.request('GET /repos/{owner}/{repo}/git/ref/{ref}', {
                owner: org,
                repo: repoName,
                ref: `heads/${defaultBranch}`
              });
              const headSha = refData.data.object.sha;

              const commitData = await github.request('GET /repos/{owner}/{repo}/git/commits/{commit_sha}', {
                owner: org,
                repo: repoName,
                commit_sha: headSha
              });
              const treeSha = commitData.data.tree.sha;

              const newTree = await github.request('POST /repos/{owner}/{repo}/git/trees', {
                owner: org,
                repo: repoName,
                base_tree: treeSha,
                tree: [
                  {
                    path: 'package.json',
                    mode: '100644',
                    type: 'blob',
                    content: JSON.stringify(pkg, null, 2) + '\n'
                  },
                  {
                    path: 'package-lock.json',
                    mode: '100644',
                    type: 'blob',
                    content: JSON.stringify(lock, null, 2) + '\n'
                  }
                ]
              });

              const newCommit = await github.request('POST /repos/{owner}/{repo}/git/commits', {
                owner: org,
                repo: repoName,
                message: `chore: update package name to ${repoName}`,
                tree: newTree.data.sha,
                parents: [headSha]
              });

              await github.request('PATCH /repos/{owner}/{repo}/git/refs/{ref}', {
                owner: org,
                repo: repoName,
                ref: `heads/${defaultBranch}`,
                sha: newCommit.data.sha
              });

              console.log(`package.json and package-lock.json updated with name: ${repoName}`);
            }

            await github.request('PUT /repos/{owner}/{repo}/actions/permissions', {
              owner: org,
              repo: repoName,
              enabled: true
            });
            console.log('Actions re-enabled');
      - name: Log URL
        run: echo "Repository successfully created via template!"
